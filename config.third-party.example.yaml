# Third-party OpenAI-compatible endpoint example.
# Edit rooms before running. Only set enabled: true for rooms you really want to monitor.

service:
  timezone: "Asia/Shanghai"
  poll_interval_seconds: 30
  status_parallelism: 2
  processing_parallelism: 1
  record_retry_cooldown_seconds: 180
  data_dir: "data/third-party"
  log_level: "INFO"

rooms:
  # Replace this with your own SHOWROOM rooms and set enabled: true.
  - name: "示例房间"
    room_id: 123456
    url: "https://www.showroom-live.com/r/example"
    enabled: false

naming:
  filename_template: "{streamer}_{started_at:%Y%m%d_%H%M%S}_{title_slug}"
  title_template: "【{streamer}】SHOWROOM直播录像 {started_at:%Y-%m-%d %H:%M}"
  part_title_template: "{started_at:%Y%m%d} showroom 直播"
  desc_template: |
    自动录制的 SHOWROOM 直播录像。
    主播：{streamer}
    直播间：{room_url}
    录制时间：{started_at:%Y-%m-%d %H:%M:%S}
  dynamic_template: "{streamer} SHOWROOM直播录像"

record:
  strategy: "yt_dlp"
  yt_dlp_bin: "yt-dlp"
  extra_args: []
  cookies_file: ""
  min_file_size_mb: 5

transcode:
  enabled: true
  ffmpeg_bin: "ffmpeg"
  width: 1920
  height: 1080
  fps: 30
  scale_mode: "fit"
  video_codec: "libx264"
  preset: "medium"
  crf: 20
  audio_codec: "aac"
  audio_bitrate: "192k"
  extra_args: []

asr:
  enabled: true
  provider: "openai_compatible"
  # The provider must support /audio/transcriptions. If it only supports text chat,
  # use local faster_whisper for ASR instead.
  model: "provider-asr-model-name"
  base_url: "https://your-provider.example.com/v1"
  api_key_env: "THIRD_PARTY_API_KEY"
  organization_env: ""
  project_env: ""
  trust_env: false
  timeout_seconds: 300
  retries: 3
  language: "ja"
  chunk_seconds: 180
  max_file_size_mb: 24
  audio_format: "mp3"
  audio_bitrate: "64k"
  response_format: "json"
  chunking_strategy: ""
  prompt: ""

translation:
  enabled: true
  # Most third-party compatible APIs support /chat/completions, not Responses API.
  provider: "openai_compatible"
  batch_size: 20
  retries: 3
  openai_compatible:
    base_url: "https://your-provider.example.com/v1"
    api_key_env: "THIRD_PARTY_API_KEY"
    trust_env: false
    model: "provider-text-model-name"
    temperature: 0.1
    timeout_seconds: 180
    json_mode: false
  openai_responses:
    base_url: "https://your-provider.example.com/v1"
    api_key_env: "THIRD_PARTY_API_KEY"
    organization_env: ""
    project_env: ""
    trust_env: false
    model: "provider-responses-model-name"
    reasoning_effort: "high"
    max_output_tokens: 8192
    timeout_seconds: 180

subtitles:
  max_line_chars: 24
  bilingual: false

upload:
  # Set to true only after biliup login and upload metadata are ready.
  enabled: false
  uploader: "biliup"
  subtitle_mode: "hard_subbed"
  cleanup_after_success: false
  keep_latest_upload_per_room: false
  biliup:
    mode: "upload" # upload | append | monthly
    append_vid: ""
    append_vids: {}
    monthly_state_file: "data/biliup-monthly.json"
    monthly_key_template: "{streamer}:{started_at:%Y%m}"
    trust_env: false
    bin: "biliup"
    user_cookie: "data/biliup-cookies.json"
    line: "kodo"
    limit: 3
    tid: 21
    copyright: 2
    source_template: "{room_url}"
    tags:
      - "SHOWROOM"
      - "直播录像"
    cover: ""
    desc_format_id: 0
    open_subtitle: true
    subtitle_language: "zh"
    upload_subtitle_draft: false
    subtitle_page_wait_seconds: 900
    subtitle_page_poll_seconds: 30
    subtitle_errors_fatal: true
    extra_args: []
