service:
  timezone: "Asia/Shanghai"
  poll_interval_seconds: 30
  status_parallelism: 2
  processing_parallelism: 1
  record_retry_cooldown_seconds: 180
  data_dir: "data/local-model"
  log_level: "INFO"

rooms:
  # Replace this with your own SHOWROOM rooms and set enabled: true.
  - name: "示例房间"
    room_id: 123456
    url: "https://www.showroom-live.com/r/example"
    enabled: false

naming:
  filename_template: "{streamer}_{started_at:%Y%m%d_%H%M%S}_{title_slug}"
  title_template: "【{streamer}】{started_at:%Y%m} SHOWROOM直播合集"
  part_title_template: "{started_at:%Y%m%d} showroom 直播"
  desc_template: |
    自动录制的 SHOWROOM 直播录像。
    主播：{streamer}
    直播间：{room_url}
    录制时间：{started_at:%Y-%m-%d %H:%M:%S}
  dynamic_template: "{streamer} SHOWROOM直播录像"

record:
  strategy: "ffmpeg"
  min_file_size_mb: 0.1
  min_duration_seconds: 10
  ffmpeg_fallback_to_ytdlp: true
  # Optional test-only limit. Leave empty/null for normal full-live recording.
  max_seconds:

transcode:
  enabled: true
  ffmpeg_bin: "ffmpeg"
  width: 1280
  height: 720
  fps: 30
  scale_mode: "fit"
  video_codec: "libx264"
  preset: "veryfast"
  crf: 23
  audio_codec: "aac"
  audio_bitrate: "128k"
  extra_args: []

asr:
  enabled: true
  provider: "faster_whisper"
  # 可以填模型名，也可以填你下载好的本地 CTranslate2/faster-whisper 模型目录。
  # 例如："models/asr/faster-whisper-large-v3"
  model: "models/asr/faster-whisper-large-v3"
  device: "cpu"        # cpu | cuda | auto
  compute_type: "int8" # CPU: int8. NVIDIA GPU: float16.
  normalize_audio: true
  language: "ja"
  beam_size: 5
  vad_filter: true

translation:
  enabled: true
  provider: "transformers_seq2seq"
  batch_size: 8
  retries: 1
  transformers:
    # 指向你下载好的 Hugging Face seq2seq 翻译模型目录。
    # NLLB 示例语言代码：日语 jpn_Jpan -> 简中 zho_Hans
    model_path: "models/translation/nllb-200-distilled-600M"
    local_files_only: true
    source_lang: "jpn_Jpan"
    target_lang: "zho_Hans"
    device: "cpu"       # cpu | cuda | auto
    torch_dtype: "float32"
    batch_size: 1
    max_input_tokens: 256
    max_new_tokens: 160
    num_beams: 4

subtitles:
  max_line_chars: 24
  bilingual: false

danmaku:
  enabled: false
  burn_in: true
  poll_seconds: 2
  request_timeout_seconds: 10
  display_seconds: 14
  max_entries: 20000
  max_text_chars: 80
  max_user_name_chars: 16
  lane_count: 12
  font_name: "Microsoft YaHei"
  font_size: 32
  font_opacity: 0.6
  top_margin: 24
  bottom_margin: 140
  include_user_name: true
  include_system_messages: false

upload:
  # Set to true only after biliup login and upload metadata are ready.
  enabled: false
  uploader: "biliup"
  subtitle_mode: "hard_subbed"
  cleanup_after_success: false
  keep_latest_upload_per_room: false
  biliup:
    mode: "upload" # upload | append | monthly
    append_vid: ""
    append_vids: {}
    monthly_state_file: "data/biliup-monthly.json"
    monthly_key_template: "{streamer}:{started_at:%Y%m}"
    trust_env: false
    bin: "biliup"
    user_cookie: "data/biliup-cookies.json"
    line: "kodo"
    limit: 3
    tid: 21
    copyright: 2
    source_template: "{room_url}"
    tags:
      - "SHOWROOM"
      - "直播录像"
    cover: ""
    desc_format_id: 0
    open_subtitle: true
    subtitle_language: "zh"
    upload_subtitle_draft: false
    subtitle_page_wait_seconds: 900
    subtitle_page_poll_seconds: 30
    subtitle_errors_fatal: true
    extra_args: []
