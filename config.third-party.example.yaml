# 第三方 OpenAI 兼容端点示例。
# 前提：供应商必须实际提供对应能力；仅有 API Key 不能绕过模型供应商限制。

asr:
  enabled: true
  provider: "openai_compatible"
  # 如果第三方代理真实转发 OpenAI 音频接口，可以继续使用 OpenAI 模型名。
  # 如果是第三方自己的音频模型，改成供应商文档里的模型名。
  model: "gpt-4o-transcribe-diarize"
  base_url: "https://your-provider.example.com/v1"
  api_key_env: "THIRD_PARTY_API_KEY"
  organization_env: ""
  project_env: ""
  trust_env: false
  timeout_seconds: 300
  retries: 3
  language: "ja"
  chunk_seconds: 180
  max_file_size_mb: 24
  audio_format: "mp3"
  audio_bitrate: "64k"
  response_format: "diarized_json"
  chunking_strategy: "auto"
  prompt: ""

# 情况 A：供应商兼容 OpenAI Responses API。
translation:
  enabled: true
  provider: "openai_responses"
  batch_size: 20
  retries: 3
  openai_responses:
    base_url: "https://your-provider.example.com/v1"
    api_key_env: "THIRD_PARTY_API_KEY"
    organization_env: ""
    project_env: ""
    trust_env: false
    # 可以填供应商支持的 OpenAI 模型别名，或供应商自己的模型名。
    model: "gpt-5.5"
    reasoning_effort: "high"
    max_output_tokens: 8192
    timeout_seconds: 180

# 情况 B：供应商只兼容 /chat/completions。
# 把上面的 translation.provider 改成 openai_compatible，并使用这一段。
translation_chat_completions_fallback:
  provider: "openai_compatible"
  openai_compatible:
    base_url: "https://your-provider.example.com/v1"
    api_key_env: "THIRD_PARTY_API_KEY"
    trust_env: false
    model: "供应商文档中的模型名"
    temperature: 0.1
    timeout_seconds: 180
    json_mode: false
